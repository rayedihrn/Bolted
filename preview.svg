<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Grid lines -->
  <line x1="400" y1="0" x2="400" y2="630" stroke="#FFE000" stroke-width="1" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#FFE000" stroke-width="1" opacity="0.04"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#FFE000" stroke-width="1" opacity="0.04"/>

  <!-- Diagonal stripe texture -->
  <line x1="0" y1="0" x2="630" y2="630" stroke="#FFE000" stroke-width="1" opacity="0.03"/>
  <line x1="200" y1="0" x2="830" y2="630" stroke="#FFE000" stroke-width="1" opacity="0.03"/>
  <line x1="400" y1="0" x2="1030" y2="630" stroke="#FFE000" stroke-width="1" opacity="0.03"/>
  <line x1="600" y1="0" x2="1200" y2="600" stroke="#FFE000" stroke-width="1" opacity="0.03"/>

  <!-- Big BG letter -->
  <text x="900" y="620" font-family="Georgia, serif" font-size="560" font-weight="700" fill="none" stroke="#FFE000" stroke-width="1" opacity="0.05" text-anchor="middle">B</text>

  <!-- Yellow accent bar -->
  <rect x="80" y="260" width="6" height="120" fill="#FFE000"/>

  <!-- BOLTED -->
  <text x="104" y="360" font-family="Georgia, serif" font-size="160" font-weight="700" fill="#FFE000" letter-spacing="-4">BOLTED</text>

  <!-- Tagline -->
  <text x="106" y="410" font-family="monospace" font-size="22" fill="#f5f5f0" opacity="0.5" letter-spacing="4">CUSTOM SKATEBOARD BUILDS</text>

  <!-- Price pill -->
  <rect x="106" y="445" width="180" height="52" fill="#FFE000" rx="2"/>
  <text x="196" y="478" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#080808" text-anchor="middle" letter-spacing="1">$40 A BUILD</text>

  <!-- Skateboard illustration -->
  <g transform="translate(970, 290)">
    <!-- deck -->
    <rect x="-35" y="-130" width="70" height="260" rx="20" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <!-- grip lines -->
    <line x1="-25" y1="-120" x2="25" y2="120" stroke="#FFE000" stroke-width="2" opacity="0.08"/>
    <line x1="-10" y1="-125" x2="35" y2="115" stroke="#FFE000" stroke-width="2" opacity="0.08"/>
    <line x1="-35" y1="-100" x2="10" y2="125" stroke="#FFE000" stroke-width="2" opacity="0.08"/>
    <!-- BOLTED text on board -->
    <text x="0" y="5" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#FFE000" text-anchor="middle" opacity="0.8" letter-spacing="2">BOLTED</text>
    <!-- trucks -->
    <rect x="-50" y="-95" width="100" height="14" rx="3" fill="#888"/>
    <rect x="-50" y="81" width="100" height="14" rx="3" fill="#888"/>
    <!-- wheels -->
    <circle cx="-52" cy="-88" r="11" fill="#f0f0f0"/>
    <circle cx="52" cy="-88" r="11" fill="#f0f0f0"/>
    <circle cx="-52" cy="88" r="11" fill="#f0f0f0"/>
    <circle cx="52" cy="88" r="11" fill="#f0f0f0"/>
    <circle cx="-52" cy="-88" r="4" fill="#ccc"/>
    <circle cx="52" cy="-88" r="4" fill="#ccc"/>
    <circle cx="-52" cy="88" r="4" fill="#ccc"/>
    <circle cx="52" cy="88" r="4" fill="#ccc"/>
  </g>

  <!-- Bottom line -->
  <rect x="80" y="555" width="1040" height="1" fill="#FFE000" opacity="0.15"/>
  <text x="80" y="590" font-family="monospace" font-size="16" fill="#f5f5f0" opacity="0.25" letter-spacing="3">RAY · HEERAN · SUDDAYS · EMRAAN</text>
</svg>
